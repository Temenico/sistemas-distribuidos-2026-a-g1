server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/binnacle/**

        - id: inventory-service
          uri: http://inventory-service:8082
          predicates:
            - Path=/api/products/**,/api/movements/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO