server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5432/farmaexpres_inventory
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.springframework.security: DEBUG

